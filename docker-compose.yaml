services:
  django:
    build: .
    expose:
      - "8000"
    volumes:
      - ./extended:/app
    env_file:
      - .env
    networks:
      - app_network

  frontend:
    build:
      context: ./extended/extended_frontend
      dockerfile: Dockerfile
    expose:
      - "80"
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - django
      - frontend
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
