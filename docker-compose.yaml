services:
  django:
    build: .
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn extended_api.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - static_data:/staticfiles
    restart: unless-stopped
    networks:
      - app_network

  frontend:
    build:
      context: ./extended/extended_frontend
      dockerfile: Dockerfile
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_data:/staticfiles:ro
    depends_on:
      - django
      - frontend
    restart: unless-stopped
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  static_data:
