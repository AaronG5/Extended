services:
  django:
    build: .
    expose:
      - "8000"
    volumes:
      - ./extended:/app
    env_file:
      - .env
    networks:
      - app_network

  frontend:
    build:
      context: ./extended/extended_frontend
      dockerfile: Dockerfile
    expose:
      - "80"
    networks:
      - app_network

  classifier:
    build:
      context: ./extended/extended_ai_classifier/inference-service
      dockerfile: Dockerfile
    expose:
      - "8000"
    volumes:
      - ./extended/extended_ai_classifier/saved_model:/app/saved_model:ro
    environment:
      MODEL_PATH: saved_model/model_250hz.json
      ENCODER_PATH: saved_model/label_encoder.pkl
      MODEL_FREQ_HZ: "250"
      MODEL_SOURCE_HZ: "250"
      MODEL_IMG_SIZE: "32"
      ALLOWED_ORIGINS: http://stavaris.com,http://www.stavaris.com,http://localhost:3000,https://stavaris.com,https://www.stavaris.com
    restart: unless-stopped
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - django
      - frontend
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
